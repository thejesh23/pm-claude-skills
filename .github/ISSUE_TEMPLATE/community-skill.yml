name: "🌐 List a community skill"
description: Add your own skill repo/pack to the Community Skills directory (community-maintained, not eval-scored).
title: "[Community] <your skill or pack name>"
labels: ["community-skill"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to list a skill that lives in **your own repo** in [`COMMUNITY-SKILLS.md`](../blob/main/COMMUNITY-SKILLS.md).

        These listings are **community-maintained and not eval-scored or security-audited** — they're for discovery. The fastest path is a **one-row PR** to `COMMUNITY-SKILLS.md`; use this form if you'd rather we add it for you.

        Want it *in* the curated library (playground / MCP / exports / leaderboard) instead? Use the **🧠 Submit a skill** form — that path is eval-gated.
  - type: input
    id: name
    attributes:
      label: Name
      description: The skill or pack name, as it should appear in the directory.
      placeholder: e.g. Acme PM Skills
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repo URL
      description: A public repo containing at least one valid SKILL.md.
      placeholder: https://github.com/you/your-repo
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author handle
      placeholder: "@your-github-handle"
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: One-line description
      description: What it produces and when to use it. No marketing fluff.
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: The repo is public and contains at least one valid SKILL.md (frontmatter name + description)
          required: true
        - label: The content is safe — no prompt injection, data exfiltration, or hidden instructions
          required: true
        - label: I understand this listing is community-maintained and not eval-scored or endorsed
          required: true
