name: Generate Launch Posts

# Reads the last ~10 merged PRs, asks Claude to find the new/groundbreaking
# features, and writes a ready-to-post launch draft (Show HN, X thread, LinkedIn,
# Reddit, Product Hunt) PLUS a paste-ready Medium-article prompt — then opens a PR
# with the draft. Manual-only (spends API credits). Uses the ANTHROPIC_API_KEY
# secret; the key never leaves GitHub.
#
# Run it from the Actions tab → "Generate Launch Posts" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      pr_count:
        description: 'How many recent merged PRs to consider (1–30)'
        required: false
        default: '10'
      model:
        description: 'Claude model id'
        required: false
        default: 'claude-sonnet-4-6'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate the launch draft from recent PRs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_COUNT: ${{ github.event.inputs.pr_count || '10' }}
          MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4-6' }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set."
            exit 1
          fi
          node scripts/generate-launch-posts.mjs

      # main is protected (requires PRs), so open a PR instead of pushing directly.
      - name: Open a PR with the launch draft
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: docs/launch-drafts
          branch: launch-posts-draft
          delete-branch: true
          commit-message: "docs(launch): generate launch posts from recent PRs"
          title: "docs(launch): launch posts from recent PRs"
          body: |
            Auto-generated by the **Generate Launch Posts** workflow from the latest
            merged PRs. Includes ready-to-post copy (Show HN, X, LinkedIn, Reddit,
            Product Hunt) and a paste-ready Medium-article prompt, in
            `docs/launch-drafts/`.

            ⚠️ **Review before posting** — verify every number and link; the draft is
            model-generated from PR descriptions.
