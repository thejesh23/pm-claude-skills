name: Publish pm-skills-tools to npm

# Publishes the agent-tools subpackage (tools-pkg/). Manual dispatch only —
# regenerate first (node scripts/build-tools-exports.mjs) and bump
# tools-pkg/package.json. Reuses the NPM_TOKEN secret.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Freshness + self-test
        run: |
          node scripts/build-tools-exports.mjs
          git diff --exit-code -- tools-pkg/ || (echo "::error::tools-pkg is stale — regenerate and commit before publishing." && exit 1)
          node --input-type=module -e "import { pick, toOpenAI } from './tools-pkg/tools.mjs'; if (toOpenAI(pick(['prd_template'])).length !== 1) process.exit(1); console.log('self-test ok');"
      - name: Publish (public, with provenance)
        working-directory: tools-pkg
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
