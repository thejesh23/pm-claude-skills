name: Skill of the Week

# Picks a featured skill each week, composes X + LinkedIn posts, and (optionally)
# auto-publishes via a webhook. The post text always lands in the job summary so
# you can copy-paste even without the webhook configured.
#
# To auto-publish: add a repo secret POST_WEBHOOK_URL pointing at a Zapier / Make /
# Buffer / Slack incoming webhook that takes { text, linkedin, skill, link }.

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pick & compose the skill of the week
        env:
          POST_WEBHOOK_URL: ${{ secrets.POST_WEBHOOK_URL }}
        run: node scripts/skill-of-the-week.mjs

      # main is protected (requires PRs), so open a PR instead of pushing directly.
      # create-pull-request is a no-op when web/skill-of-the-week.json is unchanged.
      - name: Open a PR if the featured skill changed
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: web/skill-of-the-week.json
          branch: skill-of-the-week
          delete-branch: true
          commit-message: "chore: skill of the week"
          title: "chore: skill of the week"
          body: |
            Auto-generated by the **Skill of the Week** workflow — updates the
            featured skill (`web/skill-of-the-week.json`). Merging refreshes the
            site's featured pick. The composed X / LinkedIn posts are in the
            workflow run's job summary.
