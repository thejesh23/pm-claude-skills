# Bring-your-model SkillBench — run the benchmark on YOUR model, in YOUR fork,
# on YOUR key. Fork this repo, add BYO_API_KEY (and optionally BYO_BASE_URL for
# any OpenAI-compatible endpoint) as fork secrets, run this workflow, then PR
# the produced skillbench/community/<model>.json back with the run link.
# Costs the submitter ~$1-5 in inference; costs this repo nothing.
name: SkillBench (bring your model)
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model id as your endpoint expects it (e.g. my-model-v2)'
        required: true
jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run SkillBench
        env:
          OPENAI_API_KEY: ${{ secrets.BYO_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.BYO_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.BYO_JUDGE_KEY }}
        run: node skillbench/run-skillbench.mjs --models "${{ inputs.model }}"
      - name: Stage community result
        run: |
          mkdir -p skillbench/community
          node -e "
            const r = require('./skillbench/results.json');
            const m = '${{ inputs.model }}'.replace(/[^a-zA-Z0-9._-]/g, '_');
            require('fs').writeFileSync('skillbench/community/' + m + '.json', JSON.stringify({
              submitted_via: 'skillbench-byo', run: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID,
              ...r,
            }, null, 2));
          "
      - uses: actions/upload-artifact@v4
        with:
          name: skillbench-community-result
          path: skillbench/community/
