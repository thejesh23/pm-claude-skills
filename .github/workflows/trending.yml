name: Refresh trending skills

# Pulls the most-run skills from GoatCounter into web/trending.json so the playground's
# "🔥 Trending this week" strip reflects real usage. The API token stays in repo secrets
# (never in the client). No token configured → the script no-ops, so this is harmless.
#
# ONE-TIME SETUP:
#   1. GoatCounter → Settings → "API tokens" → create a token with "Read statistics".
#   2. Add it as the repo secret GOATCOUNTER_TOKEN (Settings → Secrets and variables → Actions).
# Then it runs weekly (or dispatch it manually).

on:
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build trending.json
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GOATCOUNTER_SITE: mohitagw
        run: node scripts/build-trending.mjs
      - name: Open a PR with the refreshed trending data
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: web/trending.json
          branch: trending-data
          delete-branch: true
          commit-message: "chore(trending): refresh trending skills from usage"
          title: "chore(trending): refresh trending skills"
          body: |
            Auto-generated by the **Refresh trending skills** workflow from GoatCounter usage.
            Merging this updates the "🔥 Trending this week" strip on the playground.
