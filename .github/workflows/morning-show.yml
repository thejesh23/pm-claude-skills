name: Morning Show (weekly newsletter)

# Moonshot #6 — a passive audience with no new content work. Composes a weekly
# issue from the catalog (deterministic, no API cost) and commits it. Turn the
# schedule on to publish every Monday; wire the last issue into an ESP/TTS step
# to make it a real email or podcast.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 1' # every Monday 13:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose this week's issue
        run: node scripts/build-morning-show.mjs

      # Direct pushes to main are blocked by branch protection, so open a PR
      # (matching trending/skill-of-the-week). No-op when newsletter/ is unchanged.
      - name: Open a PR with this week's issue
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: newsletter/
          branch: newsletter-weekly
          delete-branch: true
          commit-message: "newsletter: weekly issue"
          title: "newsletter: this week's issue"
          body: |
            Auto-composed by the **Morning Show** workflow from the skill catalog (deterministic, no API cost).
            Merging this publishes the week's newsletter issue under `newsletter/`.

      # Optional next steps (left as comments): pipe newsletter/*latest*.md into
      # Buttondown/Mailchimp for email, or a TTS action for the podcast audio.
