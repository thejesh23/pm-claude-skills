name: Grow the library (mine gaps)

# The self-growing loop. Harvests real requests (open issues labelled
# "skill-request"), measures them against the catalog, and opens a PR with a
# fresh gaps report plus a scaffolded draft of the single biggest uncovered
# skill — for a human to complete and merge. Manual + monthly; never touches
# skills/ directly, never auto-merges. Zero model cost (lexical only).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 * *' # 1st of each month, 12:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Fold open "skill-request" issues into the request list (best-effort).
      - name: Harvest skill-request issues
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/skill-requests.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const seen = new Set(data.requests.map(r => r.topic.toLowerCase()));
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'skill-request', per_page: 100,
            });
            let added = 0;
            for (const it of issues) {
              const topic = (it.title || '').replace(/^\[?skill[- ]?request\]?:?\s*/i, '').trim().slice(0, 80);
              if (!topic || seen.has(topic.toLowerCase())) continue;
              seen.add(topic.toLowerCase());
              data.requests.push({ topic, ask: (it.body || topic).slice(0, 240).replace(/\s+/g, ' ').trim(), demand: 1 + (it.reactions ? it.reactions.total_count : 0) });
              added++;
            }
            if (added) fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            core.info(`Harvested ${added} new request(s) from issues.`);

      - name: Mine the catalog for gaps
        run: node scripts/mine-gaps.mjs

      - name: Open a PR with the gaps + top scaffold
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/grow-library
          commit-message: "grow: mined library gaps + scaffolded the top uncovered skill"
          title: "🌱 Growth: library gaps + a scaffolded draft for the biggest one"
          body: |
            Auto-generated by the [grow workflow](.github/workflows/grow.yml).

            - `proposals/GAPS.md` — the current gaps report (lexical shortlist, not a verdict).
            - Any `proposals/<slug>/SKILL.md` — a **scaffold** of the biggest uncovered skill, for a human to complete against the authoring standard before it moves to `skills/`.

            Review the gap list, finish or discard the draft, and merge if it's worth adding. Nothing here ships until you say so.
          add-paths: |
            proposals/**
            data/skill-requests.json
          delete-branch: true
