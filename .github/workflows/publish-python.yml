name: Publish Python package (PyPI)

# Builds and publishes the `pm-skills` Python package to PyPI — so you never need Python
# locally. Uses PyPI Trusted Publishing (OIDC): no token/secret to manage.
#
# ONE-TIME SETUP on PyPI (https://pypi.org/manage/account/publishing/):
#   Add a "pending publisher":
#     PyPI project name: pm-skills
#     Owner:             mohitagw15856
#     Repository:        pm-claude-skills
#     Workflow name:     publish-python.yml
#     Environment:       pypi
# Then run this workflow (Actions tab → Run workflow) or publish a release.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Refresh bundled catalog
        run: |
          node web/build-skills.mjs
          cp web/skills.json python/pm_skills/skills.json
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build python/ --outdir dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
