<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google-site-verification" content="osZgdSLYnqidzCKt4CxjqAxo44OqGvlKi-Bmg0UmxFQ" />
<title>The Stage — watch a Boardroom session as a 3D scene</title>
<meta name="description" content="Paste any Boardroom replay link and watch the session as cinema: a long table in moody light, executives as glowing figures, the camera cutting to whoever speaks, your document floating as a hologram that cracks as objections land — and a verdict finale that seals it gold or shatters it. No key needed to watch." />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script src="voice.js"></script>
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  #scene3d { position: fixed; inset: 0; }
  .enter { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; background: rgba(5,6,10,.92); }
  .enter .card { max-width: 500px; padding: 26px 30px; border: 1px solid var(--border); border-radius: 16px; background: var(--panel); }
  .enter input { width: 100%; box-sizing: border-box; padding: 11px 13px; border-radius: 11px; background: var(--bg,#10131a); border: 1px solid var(--border); color: var(--text); font-family: inherit; margin: 10px 0; }
  #caption { position: fixed; left: 50%; transform: translateX(-50%); bottom: 22px; z-index: 6; width: min(720px, 90vw); background: rgba(10,12,17,.88); border: 1px solid var(--border); border-radius: 14px; padding: 13px 18px; font-size: 14px; line-height: 1.55; display: none; backdrop-filter: blur(8px); max-height: 30vh; overflow-y: auto; }
  #caption .who { font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  #hud { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 6; display: flex; gap: 8px; }
  #hud button { padding: 8px 14px; border-radius: 999px; background: rgba(16,19,26,.85); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 12.5px; cursor: pointer; }
  #back { position: fixed; top: 12px; left: 12px; z-index: 6; font-size: 12px; color: var(--muted); text-decoration: none; background: rgba(16,19,26,.85); border: 1px solid var(--border); border-radius: 999px; padding: 8px 13px; }
</style>
</head>
<body>
<canvas id="scene3d"></canvas>
<a id="back" href="boardroom.html">← Boardroom</a>
<div id="hud" style="display:none"><button id="playPause" type="button">⏸</button><button id="theatreBtn" type="button">🔇 Voices</button></div>
<div id="caption"><div class="who" id="capWho"></div><div id="capText" class="markdown"></div></div>
<div class="enter" id="enter">
  <div class="card">
    <h2 style="margin:0 0 8px">🏛 The Stage</h2>
    <p style="color:var(--muted);font-size:13.5px;line-height:1.55">Watch any Boardroom session as a 3D scene. Paste a <b>replay link</b> (made with 🔗 Share replay in the <a href="boardroom.html">Boardroom</a>) — or arrive here with <code>#replay=…</code> already in the URL.</p>
    <input id="link" placeholder="https://…/boardroom.html#replay=…" />
    <button id="go" class="primary" type="button">🎬 Raise the curtain</button>
    <span id="err" class="status" style="display:block;margin-top:8px"></span>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
const el=(id)=>document.getElementById(id);

async function gunz(b64){
  const s=atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
  const buf=new Uint8Array(s.length); for(let i=0;i<s.length;i++) buf[i]=s.charCodeAt(i);
  return new Response(new Blob([buf]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
}
function extract(str){ const m=String(str).match(/#replay=([A-Za-z0-9_-]+)/); return m?m[1]:null; }

// ── Scene ─────────────────────────────────────────────────────────────────────
const canvas=el('scene3d');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x06070c);
scene.fog=new THREE.Fog(0x06070c, 30, 90);
const camera=new THREE.PerspectiveCamera(46, 1, 0.1, 300);
function resize(){ renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
resize(); addEventListener('resize',resize);

// Moody room: table, floor, one warm key light + cool rim.
scene.add(new THREE.AmbientLight(0x445066, 0.55));
const spot=new THREE.SpotLight(0xffe2b8, 260, 60, 0.7, 0.55); spot.position.set(0,14,0); spot.castShadow=true; scene.add(spot);
const rim=new THREE.DirectionalLight(0x5f7dff, 0.5); rim.position.set(-10,6,-12); scene.add(rim);
const floor=new THREE.Mesh(new THREE.PlaneGeometry(90,90), new THREE.MeshStandardMaterial({color:0x0b0d13, roughness:0.85, metalness:0.1}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
const table=new THREE.Mesh(new THREE.BoxGeometry(14,0.5,5.2), new THREE.MeshPhysicalMaterial({color:0x2b2119, roughness:0.28, clearcoat:0.7}));
table.position.y=2.2; table.castShadow=true; table.receiveShadow=true; scene.add(table);
for(const dx of [-6,6]) for(const dz of [-2,2]){
  const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,2.2), new THREE.MeshStandardMaterial({color:0x1a1410}));
  leg.position.set(dx,1.1,dz); scene.add(leg);
}

// The hologram document at the table's center.
const holo=new THREE.Group();
const holoMat=new THREE.MeshPhysicalMaterial({color:0x74d7ff, transparent:true, opacity:0.34, transmission:0.5, roughness:0.1, emissive:0x2288bb, emissiveIntensity:0.7, side:THREE.DoubleSide});
const holoDoc=new THREE.Mesh(new THREE.PlaneGeometry(2.6,3.4), holoMat);
holo.add(holoDoc);
for(let i=0;i<7;i++){ const line=new THREE.Mesh(new THREE.PlaneGeometry(1.9-(i%3)*0.3,0.09), new THREE.MeshBasicMaterial({color:0xbfeaff, transparent:true, opacity:0.75}));
  line.position.set(-0.2+(i%3)*0.06, 1.2-i*0.38, 0.01); holo.add(line); }
holo.position.set(0,4.6,0); scene.add(holo);
const cracks=[];   // red fissure lines added as objections land

// Executives: glowing orb heads + cone bodies around the table, emoji as sprite.
function emojiSprite(e){
  const c=document.createElement('canvas'); c.width=c.height=128;
  const x=c.getContext('2d'); x.font='96px serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(e||'👤',64,72);
  const t=new THREE.CanvasTexture(c);
  return new THREE.Sprite(new THREE.SpriteMaterial({map:t, transparent:true}));
}
const seats={}; let seatList=[];
function buildBench(t){
  const ids=[...new Map(t.filter(x=>x.id!=='chair'&&x.id!=='user').map(x=>[x.id,x])).values()];
  const n=ids.length;
  ids.forEach((who,i)=>{
    const a=(i/(n))*Math.PI - Math.PI/2 + Math.PI/(n*2);   // arc on the far side
    const px=Math.sin(a)*8.2, pz=-Math.cos(a)*4.6-1.2;
    const g=new THREE.Group();
    const color=new THREE.Color(who.c||'#8899ff');
    const body=new THREE.Mesh(new THREE.ConeGeometry(0.75,2.1,24), new THREE.MeshStandardMaterial({color:color.clone().multiplyScalar(0.35), roughness:0.6, emissive:color, emissiveIntensity:0.12}));
    body.position.y=3.3; body.castShadow=true; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.52,24,24), new THREE.MeshPhysicalMaterial({color:color, emissive:color, emissiveIntensity:0.55, roughness:0.2}));
    head.position.y=4.9; g.add(head);
    const face=emojiSprite(who.e); face.scale.setScalar(0.9); face.position.set(0,4.9,0.5); g.add(face);
    g.position.set(px,0,pz); g.lookAt(0,3,0);
    scene.add(g);
    seats[who.id]={group:g, head, base:0.55, who};
    seatList.push(seats[who.id]);
  });
  // The Chair at the head of the table.
  const chairG=new THREE.Group();
  const cbody=new THREE.Mesh(new THREE.ConeGeometry(0.85,2.4,24), new THREE.MeshStandardMaterial({color:0x2e2a3c, emissive:0x8f7dff, emissiveIntensity:0.1}));
  cbody.position.y=3.4; chairG.add(cbody);
  const chead=new THREE.Mesh(new THREE.SphereGeometry(0.56,24,24), new THREE.MeshPhysicalMaterial({color:0xcfc6ff, emissive:0x8f7dff, emissiveIntensity:0.4}));
  chead.position.y=5.1; chairG.add(chead);
  const cface=emojiSprite('⚖️'); cface.scale.setScalar(0.95); cface.position.set(0,5.1,0.55); chairG.add(cface);
  chairG.position.set(-11,0,0); chairG.lookAt(0,3,0); scene.add(chairG);
  seats.chair={group:chairG, head:chead, base:0.4, who:{n:'The Chair', ro:'presiding', e:'⚖️'}};
  // Your seat (the presenter) on the near side — implied by the camera.
}

// ── Playback ──────────────────────────────────────────────────────────────────
let PLAYING=true, camTween=null, speaking=null, speakT=0;
function cutTo(seat){
  speaking=seat; speakT=performance.now();
  const p=seat? seat.group.position : new THREE.Vector3(0,0,6);
  const from=camera.position.clone();
  const to=seat? p.clone().multiplyScalar(0.35).add(new THREE.Vector3(p.x*0.2, 6.2, p.z*0.2+10)) : new THREE.Vector3(0,6.5,13);
  camTween={from, to, t0:performance.now(), dur:900, look:seat? seat.group.position.clone().setY(4.4) : holo.position.clone()};
}
function addCrack(){
  const g=new THREE.Mesh(new THREE.PlaneGeometry(0.06+Math.random()*0.05, 1+Math.random()*1.6),
    new THREE.MeshBasicMaterial({color:0xff4444, transparent:true, opacity:0.85}));
  g.position.set((Math.random()-.5)*2.2,(Math.random()-.5)*2.6,0.02);
  g.rotation.z=(Math.random()-.5)*1.6;
  holo.add(g); cracks.push(g);
}
const sleep=(ms)=>new Promise(r=>{ const id=setInterval(()=>{ if(PLAYING){ clearInterval(id); r(); } }, ms); });

async function play(R){
  buildBench(R.t);
  cutTo(null);
  el('hud').style.display='flex';
  const cap=el('caption');
  for(const turn of R.t){
    while(!PLAYING) await new Promise(r=>setTimeout(r,150));
    const seat=seats[turn.id]||seats.chair;
    cutTo(turn.id==='user'? null : seat);
    cap.style.display='block';
    el('capWho').textContent=(turn.e||'')+' '+turn.n+' — '+(turn.ro||'');
    // typewriter caption
    const words=String(turn.md||'').split(/\s+/); let acc='';
    if(window.PMVoice&&PMVoice.isEnabled()) PMVoice.speak(turn.id||'default', turn.md);
    for(let i=0;i<words.length;i++){
      acc+=words[i]+' ';
      if(i%3===0||i===words.length-1) el('capText').innerHTML=DOMPurify.sanitize(marked.parse(acc));
      await new Promise(r=>setTimeout(r,42));
      while(!PLAYING) await new Promise(r=>setTimeout(r,150));
    }
    // objections crack the hologram (severity words from the exec turns)
    if(turn.id!=='chair' && /(blocking|🔴|unacceptable|does not survive|fatal|reject)/i.test(turn.md||'')) { addCrack(); addCrack(); }
    else if(turn.id!=='chair' && /(concern|risk|major|🟡|weak|missing)/i.test(turn.md||'')) addCrack();
    await new Promise(r=>setTimeout(r,700));
  }
  // Finale: the Chair's verdict — gold seal or shatter.
  const verdictText=(R.memo&&(R.memo.match(/\*\*Verdict:\*\*[^\n]*/)||[])[0])||'';
  const pass=!/not ready|🔴|reject/i.test(verdictText) && cracks.length<5;
  cutTo(seats.chair);
  await new Promise(r=>setTimeout(r,1100));
  cutTo(null);
  if(pass){
    holoMat.color.set(0xffd97a); holoMat.emissive.set(0xcc8a22); holoMat.emissiveIntensity=1.1; holoMat.opacity=0.55;
    cracks.forEach(c=>c.material.color.set(0xffd97a));
    el('capWho').textContent='⚖️ THE CHAIR';
    el('capText').innerHTML=DOMPurify.sanitize(marked.parse((verdictText||'**Verdict:** the document survives the bench.')+ '\n\n🏛 *Sealed.*'));
  } else {
    // shatter: hologram fragments drift apart
    el('capWho').textContent='⚖️ THE CHAIR';
    el('capText').innerHTML=DOMPurify.sanitize(marked.parse((verdictText||'**Verdict:** not ready.')+'\n\n💥 *The hologram gives way.*'));
    for(let i=0;i<26;i++){
      const shard=new THREE.Mesh(new THREE.PlaneGeometry(0.4,0.5), holoMat.clone());
      shard.position.copy(holo.position).add(new THREE.Vector3((Math.random()-.5)*2,(Math.random()-.5)*3,0));
      shard.userData.v=new THREE.Vector3((Math.random()-.5)*3,(Math.random())*2,(Math.random()-.5)*3);
      shard.userData.shard=true; scene.add(shard); shards.push(shard);
    }
    holo.visible=false;
  }
  if(window.pmTrack) pmTrack('stage/finale/'+(pass?'sealed':'shattered'));
}
const shards=[];

// ── Loop ──────────────────────────────────────────────────────────────────────
const ease=(t)=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
renderer.setAnimationLoop(()=>{
  const now=performance.now(), t=now*0.001;
  if(camTween){
    const k=Math.min(1,(now-camTween.t0)/camTween.dur);
    camera.position.lerpVectors(camTween.from,camTween.to,ease(k));
    camera.lookAt(camTween.look);
    if(k>=1&&!speaking) camTween=null;
    else if(k>=1) camera.lookAt(camTween.look);
  }
  holo.rotation.y=Math.sin(t*0.5)*0.25;
  holo.position.y=4.6+Math.sin(t*1.1)*0.08;
  for(const s of seatList.concat(seats.chair?[seats.chair]:[])){
    const on=speaking===s;
    const pulse=on? (0.9+Math.sin(t*9)*0.45) : s.base;
    s.head.material.emissiveIntensity+= (pulse-s.head.material.emissiveIntensity)*0.12;
  }
  for(const sh of shards){ sh.position.addScaledVector(sh.userData.v, 0.016); sh.userData.v.y-=0.03; sh.rotation.x+=0.02; sh.rotation.z+=0.03; }
  renderer.render(scene,camera);
});

// ── Entry ─────────────────────────────────────────────────────────────────────
async function begin(frag){
  try{
    const R=JSON.parse(await gunz(frag));
    if(!R||!R.t||!R.t.length) throw new Error('empty');
    el('enter').style.display='none';
    window.__stageReady={turns:R.t.length};
    play(R);
    if(window.pmTrack) pmTrack('stage/play');
  }catch(e){ el('err').textContent='That link doesn\'t contain a valid Boardroom replay.'; }
}
el('go').addEventListener('click',()=>{ const f=extract(el('link').value); if(f) begin(f); else el('err').textContent='Paste a link containing #replay=…'; });
el('playPause').addEventListener('click',()=>{ PLAYING=!PLAYING; el('playPause').textContent=PLAYING?'⏸':'▶'; });
if(window.PMVoice) PMVoice.theatreToggle(el('theatreBtn'));
const own=extract(location.href);
if(own) begin(own);
</script>
</body>
</html>
