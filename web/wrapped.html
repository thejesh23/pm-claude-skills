<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google-site-verification" content="osZgdSLYnqidzCKt4CxjqAxo44OqGvlKi-Bmg0UmxFQ" />
<title>PM Skills Wrapped — your practice, as a story</title>
<meta name="description" content="Spotify Wrapped for your professional practice: skill runs, Gym scores, Boardroom survivals, interviewer calls, prediction calibration and streaks — read from this browser's local data, rendered as an animated story with a shareable card. Nothing leaves your machine." />
<link rel="stylesheet" href="styles.css" />
<style>
  body { overflow-x: hidden; }
  .w-wrap { max-width: 720px; margin: 0 auto; padding: 16px 22px 70px; }
  .deck { position: relative; border-radius: 22px; border: 1px solid var(--border); min-height: 460px; overflow: hidden; cursor: pointer; user-select: none; }
  .card { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 34px; opacity: 0; pointer-events: none; transition: opacity .45s ease; }
  .card.on { opacity: 1; pointer-events: auto; }
  .card .kick { font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.75); margin-bottom: 14px; animation: rise .6s ease both; }
  .card .big { font-size: clamp(44px, 11vw, 92px); font-weight: 800; line-height: 1; margin: 6px 0 10px; animation: pop .55s cubic-bezier(.2,1.6,.4,1) both .15s; }
  .card .sub { font-size: 16.5px; line-height: 1.5; max-width: 480px; color: rgba(255,255,255,.92); animation: rise .6s ease both .3s; }
  .card .fine { margin-top: 18px; font-size: 12.5px; color: rgba(255,255,255,.6); animation: rise .6s ease both .45s; }
  @keyframes pop { from { transform: scale(.6); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  @keyframes rise { from { transform: translateY(14px); opacity: 0 } to { transform: none; opacity: 1 } }
  .g0 { background: linear-gradient(135deg, #d97757, #8a2f62 70%); }
  .g1 { background: linear-gradient(135deg, #2b5876, #4e4376); }
  .g2 { background: linear-gradient(135deg, #0f7a5c, #123c69); }
  .g3 { background: linear-gradient(135deg, #904e95, #e96443); }
  .g4 { background: linear-gradient(135deg, #1f4037, #99622b); }
  .g5 { background: linear-gradient(135deg, #41295a, #2f0743); }
  .g6 { background: linear-gradient(135deg, #b02c40, #5b1b3c); }
  .dots { display: flex; gap: 6px; justify-content: center; margin: 14px 0 4px; }
  .dots i { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .3s, transform .3s; }
  .dots i.on { background: var(--accent); transform: scale(1.25); }
  .hint { text-align: center; color: var(--muted); font-size: 12.5px; }
  .actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .empty-cta { display: inline-block; margin: 6px 8px 0; padding: 9px 15px; border-radius: 999px; border: 1px solid rgba(255,255,255,.4); color: #fff; text-decoration: none; font-size: 13.5px; }
  .empty-cta:hover { background: rgba(255,255,255,.12); }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><img src="assets/product-notes.jpg" alt="Product Notes" class="brand-logo" />
    <div class="brand-text"><h1>PM Skills Wrapped</h1><p class="tagline">Your practice, as a story. All from this browser — nothing leaves it.</p></div></div>
</header>
<nav class="toolbar-nav" id="toolbar" aria-label="Tools"></nav>

<div class="w-wrap">
  <div class="deck" id="deck" title="Click / → to advance"></div>
  <div class="dots" id="dots"></div>
  <p class="hint">Click the card, or use ← → keys</p>
  <div id="holoWrap" style="display:none;margin:22px auto 6px;perspective:900px;width:min(300px,80vw)">
    <div id="holo" style="position:relative;border-radius:18px;padding:22px 20px 18px;background:linear-gradient(150deg,#1a1030,#3a1140 45%,#12303a);border:1px solid rgba(255,255,255,.25);transform-style:preserve-3d;transition:transform .08s linear;overflow:hidden;text-align:center">
      <div id="foil" style="position:absolute;inset:0;background:linear-gradient(115deg,transparent 20%,rgba(255,0,128,.28) 36%,rgba(0,255,224,.3) 46%,rgba(255,230,0,.26) 56%,transparent 74%);mix-blend-mode:color-dodge;pointer-events:none"></div>
      <div style="position:absolute;inset:0;background:repeating-linear-gradient(105deg,rgba(255,255,255,.05) 0 2px,transparent 2px 6px);mix-blend-mode:overlay;pointer-events:none"></div>
      <div id="holoEmoji" style="font-size:58px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.6))">🌱</div>
      <div id="holoTitle" style="font-weight:800;font-size:19px;margin:8px 0 2px;color:#fff;text-shadow:0 1px 8px rgba(255,255,255,.25)"></div>
      <div id="holoSub" style="font-size:11.5px;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase">PM Skills · collectible</div>
      <div id="holoStats" style="margin-top:12px;font-size:12.5px;color:#eaf2ff;line-height:1.7;text-align:left"></div>
    </div>
    <p class="hint" style="text-align:center">✨ holographic — move your cursor over it</p>
  </div>
  <div class="actions">
    <button id="share" class="primary" type="button">🖼 Download your share card (PNG)</button>
    <button id="replay" class="ghost" type="button">↻ Replay</button>
  </div>
</div>

<script>
const el=(id)=>document.getElementById(id);
const ls=(k,d)=>{ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch(_){ return d; } };

// ── Gather everything the arenas left behind in this browser ─────────────────
function gather(){
  const runs=ls('pm_workspace',[])||[];
  const byName={}; runs.forEach(r=>{ byName[r.name]=(byName[r.name]||0)+1; });
  const top=Object.entries(byName).sort((a,b)=>b[1]-a[1])[0];

  const gym=ls('pm_gym_scores',{})||{};
  const gymArr=Object.entries(gym).flatMap(([sc,a])=>a.map(x=>({sc,...x})));
  const gymBest=gymArr.reduce((m,x)=>x.s>(m?.s??-1)?x:m,null);
  const gymFav=Object.entries(gym).sort((a,b)=>b[1].length-a[1].length)[0];

  const panel=ls('pm_panel_runs',[])||[];
  const rightCall=p=>((p.arch==='strong')===/^(strong )?hire$/.test(p.call||''));
  const caught=panel.filter(p=>p.arch!=='strong'&&rightCall(p)).length;
  const fooled=panel.filter(p=>p.arch!=='strong'&&!rightCall(p)).length;
  const panelBest=panel.reduce((m,x)=>(x.score??-1)>(m?.score??-1)?x:m,null);

  const firm=ls('pm_firm',{})||{};
  const preds=(firm.preds||[]);
  const resolved=preds.filter(p=>p.status==='hit'||p.status==='miss');
  const hits=resolved.filter(p=>p.status==='hit').length;
  const memos=(firm.inbox||[]).length;

  const streak=ls('pm_daily_streak',{})||{};
  const brain=ls('pm_brain',{})||{};
  const facts=['context','knowledge','decisions','hypotheses','stakeholders','entities']
    .reduce((n,s)=>n+String(brain[s]||'').split('\n').filter(l=>l.trim().startsWith('-')).length,0);

  return {runs:runs.length, distinct:Object.keys(byName).length, top, gymN:gymArr.length, gymBest, gymFav,
    panelN:panel.length, caught, fooled, panelBest, predsN:resolved.length, hits, memos,
    streak:streak.streak||0, totalDays:streak.total||0, facts};
}

// ── Persona: the title your data earned ──────────────────────────────────────
function persona(d){
  const c=[];
  if(d.caught>=2&&d.fooled===0) c.push(['🕵️ The Bluffer\'s Nightmare','Nobody smooth-talks their way past your reference checks.']);
  if(d.predsN>=5&&d.hits/Math.max(1,d.predsN)>=0.7) c.push(['🔮 The Calibrated One','Your predictions land. The Firm\'s ledger doesn\'t lie.']);
  if(d.gymBest&&d.gymBest.s>=32) c.push(['🥊 The Closer','You walk out of the Gym with the deal AND the relationship.']);
  if(d.streak>=7) c.push(['🔥 The Daily Grinder','A '+d.streak+'-day streak. Practice isn\'t an event for you, it\'s a habit.']);
  if(d.runs>=30) c.push(['⚙️ The Power Operator',d.runs+' skill runs. The library is an extension of your hands now.']);
  if(d.facts>=20) c.push(['🧠 The Second Brain','Your browser remembers '+d.facts+' facts so meetings can\'t gaslight you.']);
  if(!c.length&&(d.runs+d.gymN+d.panelN)>0) c.push(['🌱 The Contender','You\'ve stepped into the arena. The titles come with the reps.']);
  return c[0];
}

// ── Build the deck (data-dependent; empty sections skipped) ──────────────────
function slides(d){
  const s=[];
  const any=d.runs+d.gymN+d.panelN+d.predsN+d.totalDays+d.facts>0;
  if(!any){
    s.push({g:0,kick:'PM Skills Wrapped',big:'👋',sub:'Nothing here yet — Wrapped reads the local data your practice leaves behind in this browser. Go make some history.',
      html:'<div><a class="empty-cta" href="index.html">▶ Run a skill</a><a class="empty-cta" href="gym.html">🥊 Enter the Gym</a><a class="empty-cta" href="boardroom.html">🪑 Face the Boardroom</a></div>'});
    return s;
  }
  s.push({g:0,kick:'PM Skills Wrapped',big:'📊',sub:'Your practice left a trail in this browser. Here\'s what it says about you.',fine:'Local data only — nothing was uploaded, nothing leaves this machine.'});
  if(d.runs) s.push({g:1,kick:'The playground',big:String(d.runs),sub:'skill run'+(d.runs===1?'':'s')+' across '+d.distinct+' different skill'+(d.distinct===1?'':'s')+'.'+(d.top?' Your go-to: “'+d.top[0]+'” — '+d.top[1]+' run'+(d.top[1]===1?'':'s')+'.':''),fine:d.runs>=30?'Top-tier volume. The library knows your footsteps.':''});
  if(d.gymN) s.push({g:2,kick:'The Gym',big:d.gymBest?d.gymBest.s+'/40':String(d.gymN),sub:d.gymN+' negotiation'+(d.gymN===1?'':'s')+' fought.'+(d.gymBest?' Personal best: '+d.gymBest.s+'/40'+(d.gymBest.diff?' on '+d.gymBest.diff:'')+'.':'')+(d.gymFav?' Favourite opponent: '+d.gymFav[0]+'.':''),fine:d.gymBest&&d.gymBest.s>=32?'That\'s closer territory.':''});
  if(d.panelN) s.push({g:3,kick:'The Panel',big:d.caught+'/'+(d.caught+d.fooled||1),sub:'imposters caught. You interviewed '+d.panelN+' candidate'+(d.panelN===1?'':'s')+(d.panelBest&&d.panelBest.score?'; best interviewer score '+d.panelBest.score+'/100':'')+'.'+(d.fooled?' The '+(d.fooled===1?'one':d.fooled)+' that got past you? They\'re someone\'s problem now.':' Nobody got past you.')});
  if(d.predsN) s.push({g:4,kick:'The Firm\'s ledger',big:Math.round(100*d.hits/Math.max(1,d.predsN))+'%',sub:'prediction calibration — '+d.hits+' hit'+(d.hits===1?'':'s')+' of '+d.predsN+' resolved. '+(d.memos?d.memos+' memo'+(d.memos===1?'':'s')+' in the inbox.':''),fine:d.hits/Math.max(1,d.predsN)>=0.7?'You can start sentences with “I called this” now.':'Calibration comes from resolving more of them — keep scoring.'});
  if(d.totalDays) s.push({g:5,kick:'The daily challenge',big:d.streak+'🔥',sub:'current streak, '+d.totalDays+' challenge'+(d.totalDays===1?'':'s')+' completed all-time.'});
  if(d.facts) s.push({g:6,kick:'The brain',big:String(d.facts),sub:'facts in your professional brain — decisions, hypotheses, stakeholders your skills silently recall before every run.'});
  const p=persona(d);
  if(p) s.push({g:0,kick:'Your title this season',big:p[0].split(' ')[0],sub:p[0].replace(/^\S+\s/,''),fine:p[1]});
  return s;
}

// ── Render & navigate ─────────────────────────────────────────────────────────
const D=gather(), SL=slides(D); let cur=0;
function paint(){
  el('deck').innerHTML=SL.map((s,i)=>'<div class="card g'+s.g+(i===0?' on':'')+'" data-i="'+i+'">'+
    '<div class="kick">'+s.kick+'</div><div class="big">'+s.big+'</div><div class="sub">'+s.sub+'</div>'+
    (s.fine?'<div class="fine">'+s.fine+'</div>':'')+(s.html||'')+'</div>').join('');
  el('dots').innerHTML=SL.map((_,i)=>'<i'+(i===0?' class="on"':'')+'></i>').join('');
}
function go(n){
  cur=Math.max(0,Math.min(SL.length-1,n));
  document.querySelectorAll('.card').forEach((c,i)=>{
    const on=i===cur; c.classList.toggle('on',on);
    if(on){ c.querySelectorAll('.kick,.big,.sub,.fine').forEach(x=>{ x.style.animation='none'; void x.offsetWidth; x.style.animation=''; }); }
  });
  document.querySelectorAll('.dots i').forEach((d,i)=>d.classList.toggle('on',i===cur));
}
paint();
el('deck').addEventListener('click',e=>{ if(e.target.closest('a')) return; go(cur+1===SL.length?0:cur+1); });
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight') go(cur+1); if(e.key==='ArrowLeft') go(cur-1); });
el('replay').addEventListener('click',()=>go(0));
if(window.pmTrack) pmTrack('wrapped/open');

// ── ✨ The holo card: your persona as a foil collectible ──────────────────────
(function(){
  const p=persona(D); if(!p) return;
  el('holoWrap').style.display='block';
  el('holoEmoji').textContent=p[0].split(' ')[0];
  el('holoTitle').textContent=p[0].replace(/^\S+\s/,'');
  const rows=[];
  if(D.runs) rows.push('⚙ '+D.runs+' skill runs');
  if(D.gymBest) rows.push('🥊 best '+D.gymBest.s+'/40');
  if(D.panelN) rows.push('🕵️ '+D.caught+'/'+(D.caught+D.fooled||1)+' imposters caught');
  if(D.predsN) rows.push('🔮 '+Math.round(100*D.hits/Math.max(1,D.predsN))+'% calibration');
  if(D.streak) rows.push('🔥 '+D.streak+'-day streak');
  el('holoStats').innerHTML=rows.slice(0,4).join('<br>');
  const card=el('holo'), foil=el('foil');
  function tilt(x,y){
    card.style.transform='rotateY('+(x*16)+'deg) rotateX('+(-y*16)+'deg)';
    foil.style.background='linear-gradient('+(115+x*70)+'deg,transparent '+(14+y*12)+'%,rgba(255,0,128,.32) '+(34+x*10)+'%,rgba(0,255,224,.34) '+(46+x*6)+'%,rgba(255,230,0,.3) '+(58-x*8)+'%,transparent 78%)';
  }
  card.parentElement.addEventListener('pointermove',(e)=>{
    const r=card.getBoundingClientRect();
    tilt(((e.clientX-r.left)/r.width-0.5)*2, ((e.clientY-r.top)/r.height-0.5)*2);
  });
  card.parentElement.addEventListener('pointerleave',()=>{ card.style.transform=''; });
  if(window.DeviceOrientationEvent) addEventListener('deviceorientation',(e)=>{ if(e.gamma!=null) tilt(Math.max(-1,Math.min(1,e.gamma/30)), Math.max(-1,Math.min(1,(e.beta-45)/30))); });
})();

// ── Share card: canvas → PNG, composed from the same numbers ─────────────────
el('share').addEventListener('click',()=>{
  const W=1080,H=1350,c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d');
  const grd=x.createLinearGradient(0,0,W,H); grd.addColorStop(0,'#d97757'); grd.addColorStop(.7,'#8a2f62'); grd.addColorStop(1,'#41295a');
  x.fillStyle=grd; x.fillRect(0,0,W,H);
  x.fillStyle='rgba(255,255,255,.14)';
  for(let i=0;i<40;i++){ x.beginPath(); x.arc(Math.random()*W,Math.random()*H,Math.random()*3+1,0,7); x.fill(); }
  x.fillStyle='rgba(255,255,255,.85)'; x.font='600 34px -apple-system,system-ui,sans-serif'; x.textAlign='center';
  x.fillText('P M   S K I L L S   W R A P P E D',W/2,110);
  const p=persona(D);
  x.fillStyle='#fff'; x.font='800 92px -apple-system,system-ui,sans-serif';
  x.fillText(p?p[0]:'🌱 Day One',W/2,260);
  const rows=[];
  if(D.runs) rows.push([String(D.runs),'skill runs · '+D.distinct+' skills']);
  if(D.gymBest) rows.push([D.gymBest.s+'/40','best Gym negotiation']);
  if(D.panelN) rows.push([D.caught+'/'+(D.caught+D.fooled||1),'imposters caught on the Panel']);
  if(D.predsN) rows.push([Math.round(100*D.hits/Math.max(1,D.predsN))+'%','prediction calibration']);
  if(D.streak) rows.push([D.streak+'🔥','day streak']);
  if(D.facts) rows.push([String(D.facts),'facts in the brain']);
  if(!rows.length) rows.push(['0 → 1','the arena awaits']);
  let y=430;
  rows.slice(0,5).forEach(r=>{
    x.textAlign='right'; x.font='800 84px -apple-system,system-ui,sans-serif'; x.fillStyle='#ffd9a8'; x.fillText(r[0],W/2-30,y);
    x.textAlign='left'; x.font='400 38px -apple-system,system-ui,sans-serif'; x.fillStyle='rgba(255,255,255,.92)'; x.fillText(r[1],W/2+10,y-8);
    y+=150;
  });
  x.textAlign='center'; x.fillStyle='rgba(255,255,255,.75)'; x.font='500 32px -apple-system,system-ui,sans-serif';
  x.fillText('mohitagw15856.github.io/pm-claude-skills',W/2,H-80);
  const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='pm-skills-wrapped.png'; a.click();
  if(window.pmTrack) pmTrack('wrapped/share-card');
});
</script>
<script src="i18n.js"></script>
<script src="a11y.js"></script>
<script src="nav.js"></script>
</body>
</html>
