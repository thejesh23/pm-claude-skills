<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google-site-verification" content="osZgdSLYnqidzCKt4CxjqAxo44OqGvlKi-Bmg0UmxFQ" />
<title>🌌 Skill Galaxy — explore every skill as a living map</title>
<meta name="description" content="The whole skills library as an interactive constellation: skills clustered by profession, brightness by eval score, Guided Journeys traced as star-paths, linked by what pairs with what. Drag, zoom, click a star to run it." />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body { overflow: hidden; }
  .galaxy-wrap { position: fixed; inset: 0; top: 0; }
  #galaxyCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    background: radial-gradient(ellipse at 50% 40%, #11151d 0%, #0a0c11 70%, #07080b 100%); }
  .galaxy-top { position: absolute; top: 14px; left: 16px; right: 16px; z-index: 5; display: flex;
    gap: 12px; align-items: center; flex-wrap: wrap; pointer-events: none; }
  .galaxy-top > * { pointer-events: auto; }
  .galaxy-title { font-size: 18px; font-weight: 800; letter-spacing: -.01em; }
  .galaxy-title small { font-weight: 500; color: var(--muted); font-size: 12px; }
  #galaxySearch { padding: 8px 12px; min-width: 190px; background: rgba(20,24,31,.85); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); font: inherit; font-size: 13px; backdrop-filter: blur(6px); }
  .galaxy-back { padding: 8px 12px; background: rgba(20,24,31,.85); border: 1px solid var(--border); border-radius: 9px;
    color: var(--text); font: inherit; font-size: 13px; text-decoration: none; backdrop-filter: blur(6px); }
  .galaxy-hint { position: absolute; bottom: 12px; left: 16px; z-index: 5; font-size: 11.5px; color: var(--muted);
    background: rgba(10,12,17,.6); padding: 5px 10px; border-radius: 8px; backdrop-filter: blur(4px); }
  .legend { position: absolute; bottom: 12px; right: 12px; z-index: 5; max-width: 230px; max-height: 46vh; overflow: auto;
    background: rgba(13,15,20,.82); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px;
    font-size: 11px; backdrop-filter: blur(8px); display: flex; flex-wrap: wrap; gap: 4px 10px; }
  .legend b { width: 100%; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 2px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; color: var(--text); cursor: pointer; opacity: .72; }
  .legend span:hover { opacity: 1; }
  .legend span.on { opacity: 1; font-weight: 700; text-shadow: 0 0 8px currentColor; }
  .legend i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  #gtip { position: fixed; z-index: 20; max-width: 280px; pointer-events: none; display: none;
    background: rgba(13,15,20,.96); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #gtip .t { font-weight: 700; font-size: 13.5px; }
  #gtip .b { font-size: 11px; color: var(--accent-2); margin: 2px 0 4px; }
  #gtip .d { font-size: 12px; color: var(--muted); line-height: 1.4; }
  #gtip .e { font-size: 11px; color: #7bd88f; margin-top: 4px; }
</style>
</head>
<body>
<div class="galaxy-wrap">
  <canvas id="galaxyCanvas"></canvas>
  <div class="galaxy-top">
    <a href="index.html" class="galaxy-back">← Playground</a>
    <span class="galaxy-title">🌌 Skill Galaxy <small id="galaxyCount"></small></span>
    <input id="galaxySearch" type="search" placeholder="Highlight a skill…" />
  </div>
  <div class="legend" id="legend"></div>
  <div class="galaxy-hint">drag to pan · scroll to zoom · click a star to run it · brightness = eval score · trace a ✨ Journey from the legend</div>
  <div id="gtip"></div>
</div>

<script src="forcegraph.js"></script>
<script>
const el = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
// Friendly bundle labels (strip the pm- prefix, title-case).
const label = (p) => p.replace(/^pm-/, '').replace(/(^|-)(\w)/g, (_, d, c) => (d ? ' ' : '') + c.toUpperCase()).trim();

(async function () {
  let skills = [], trending = {}, journeys = [];
  try { skills = (await (await fetch('skills.json')).json()).skills; } catch (_) {}
  try { trending = ((await (await fetch('trending.json', { cache: 'no-store' })).json()).skills || []).reduce((m, t) => (m[t.name] = true, m), {}); } catch (_) {}
  try { journeys = (await (await fetch('hubs.json')).json()).journeys || []; } catch (_) {}
  if (!skills.length) { el('galaxyCount').textContent = '— could not load skills.json'; return; }

  const canvas = el('galaxyCanvas');
  const r = canvas.getBoundingClientRect(), W = r.width, H = r.height, cx = W / 2, cy = H / 2;

  // One anchor + colour per bundle, arranged on a ring so each profession forms a constellation.
  const bundles = [...new Set(skills.map((s) => s.plugin))];
  const ringR = Math.min(W, H) * 0.34;
  const bmeta = {};
  bundles.forEach((b, i) => {
    const a = (i / bundles.length) * Math.PI * 2 - Math.PI / 2;
    bmeta[b] = { color: `hsl(${Math.round((i / bundles.length) * 360)}, 70%, 62%)`,
      ax: cx + Math.cos(a) * ringR, ay: cy + Math.sin(a) * ringR };
  });

  // Brightness encodes eval score: a 5/5 skill blazes, an unscored one is a dim grey ember — so the
  // eval-coverage gap is literally visible across the galaxy.
  const nodes = skills.map((s, i) => {
    const m = bmeta[s.plugin], score = s.eval ? s.eval.score : 0;
    return { id: s.name, s, scored: !!s.eval,
      color: s.eval ? m.color : '#5b6472',
      bright: s.eval ? Math.max(0.55, Math.min(1, (score - 3) / 2)) : 0.26,
      ax: m.ax, ay: m.ay, seed: i * 1.7,
      r: 4 + (score ? (score - 3.5) * 4 : 1.5), trend: !!trending[s.name] };
  });
  const idset = new Set(nodes.map((n) => n.id));
  const seen = new Set(), links = [];
  skills.forEach((s) => {
    const add = (t) => { if (t && idset.has(t)) { const k = [s.name, t].sort().join('|'); if (!seen.has(k)) { seen.add(k); links.push({ source: s.name, target: t, same: skills.find((x) => x.name === t)?.plugin === s.plugin }); } } };
    if (s.readsFirst) add(s.readsFirst);
    (s.related || []).forEach(add);
  });
  const scoredN = nodes.filter((n) => n.scored).length;
  el('galaxyCount').textContent = `· ${nodes.length} skills · ${bundles.length} professions · ${scoredN} eval-scored (brighter = higher)`;

  // ✨ Constellations — each Guided Journey is an ordered path of skills you can light up as an overlay.
  const JCOLORS = ['#ffd36e', '#7ee0c0', '#8fb8ff', '#f49ac1', '#c89bff', '#ff9f6b', '#9be15d'];
  const constellations = journeys.map((j, i) => ({
    id: j.id, name: j.name, emoji: j.emoji || '✨', color: JCOLORS[i % JCOLORS.length],
    names: [].concat(...(j.stages || []).map((st) => (st.skills || []).map((sk) => sk[0]))).filter((n) => idset.has(n)),
  })).filter((c) => c.names.length > 1);
  const activeJ = new Set();

  // 🛸 My trail — skills you've actually run (the playground's saved-runs history, this browser).
  let trailUniq = [];
  try { trailUniq = [...new Set((JSON.parse(localStorage.getItem('pm_workspace')) || []).map((r) => r.name))].filter((n) => idset.has(n)); } catch (_) {}
  let trailOn = false;

  // Legend (click a profession to spotlight it; click a journey to trace its constellation).
  let spotlight = null;
  let html = '<b>Professions · ☀ brightness = eval score</b>' + bundles.map((b) =>
    `<span data-b="${esc(b)}"><i style="background:${bmeta[b].color}"></i>${esc(label(b))}</span>`).join('');
  if (constellations.length) html += '<b style="margin-top:7px">✨ Journeys — click to trace</b>' + constellations.map((c) =>
    `<span data-j="${esc(c.id)}"><i style="background:${c.color}"></i>${esc(c.emoji)} ${esc(c.name)}</span>`).join('');
  if (trailUniq.length) html += `<b style="margin-top:7px">🛸 You</b><span data-trail="1"><i style="background:#fff"></i>My trail (${trailUniq.length} run)</span>`;
  el('legend').innerHTML = html;
  el('legend').querySelectorAll('span[data-b]').forEach((sp) =>
    sp.addEventListener('click', () => { spotlight = (spotlight === sp.dataset.b) ? null : sp.dataset.b;
      sp.parentNode.querySelectorAll('span[data-b]').forEach((x) => x.classList.toggle('on', x.dataset.b === spotlight)); }));
  el('legend').querySelectorAll('span[data-j]').forEach((sp) =>
    sp.addEventListener('click', () => { activeJ.has(sp.dataset.j) ? activeJ.delete(sp.dataset.j) : activeJ.add(sp.dataset.j);
      sp.classList.toggle('on', activeJ.has(sp.dataset.j)); }));
  const trailEl = el('legend').querySelector('span[data-trail]');
  if (trailEl) trailEl.addEventListener('click', () => { trailOn = !trailOn; trailEl.classList.toggle('on', trailOn); });

  let query = '';
  el('galaxySearch').addEventListener('input', (e) => { query = e.target.value.toLowerCase().trim(); });

  const tip = el('gtip');

  function lit(n) {
    if (query) return (n.s.title + ' ' + n.s.name + ' ' + n.s.description).toLowerCase().includes(query);
    if (spotlight) return n.s.plugin === spotlight;
    return true;
  }

  PMGraph.create(canvas, {
    nodes, links, repulsion: 900, spring: 0.02, linkLen: 42, gravity: 0.06,
    prewarm: 280, alphaDecay: 0.05, // settle off-screen, then freeze quickly — no perpetual motion
    drawLink(ctx, a, b) {
      const on = lit(a) && lit(b);
      ctx.strokeStyle = on ? 'rgba(150,170,200,0.16)' : 'rgba(120,130,150,0.04)';
      ctx.lineWidth = a.same && on ? 0.8 : 0.5;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    },
    drawNode(ctx, n, hovered, k) {
      const on = lit(n), rad = n.r;
      ctx.globalAlpha = on ? 1 : 0.12;
      // glow
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, rad * 3.4);
      grd.addColorStop(0, n.color); grd.addColorStop(0.35, n.color); grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = (on ? (n.trend ? 0.5 : 0.32) : 0.05) * n.bright;
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(n.x, n.y, rad * 3.4, 0, 7); ctx.fill();
      // core — brightness scales with eval score (unscored skills stay dim)
      ctx.globalAlpha = on ? n.bright : 0.1;
      ctx.fillStyle = n.color; ctx.beginPath(); ctx.arc(n.x, n.y, rad, 0, 7); ctx.fill();
      // trending = a static ring (no animation, so the galaxy stays perfectly still)
      if (n.trend) { ctx.globalAlpha = on ? 0.85 : 0.1; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(n.x, n.y, rad + 3, 0, 7); ctx.stroke(); }
      if (hovered) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(n.x, n.y, rad, 0, 7); ctx.stroke(); }
      // label when zoomed in, hovered, or searching
      if (on && (hovered || k > 1.7 || (query && rad))) {
        ctx.globalAlpha = 1; ctx.fillStyle = hovered ? '#fff' : 'rgba(220,226,236,0.82)';
        ctx.font = (hovered ? '600 ' : '') + '11px -apple-system,system-ui,sans-serif';
        ctx.fillText(n.s.title, n.x + rad + 4, n.y + 3.5);
      }
      ctx.globalAlpha = 1;
    },
    onHover(n, x, y) {
      if (!n) { tip.style.display = 'none'; return; }
      tip.innerHTML = `<div class="t">${esc(n.s.title)}</div><div class="b">${esc(label(n.s.plugin))}${n.trend ? ' · 🔥 trending' : ''}</div><div class="d">${esc((n.s.summary || n.s.description || '').slice(0, 150))}</div>${n.s.eval ? `<div class="e">✅ ${n.s.eval.score}/5 eval</div>` : ''}`;
      tip.style.display = 'block';
      const tw = tip.offsetWidth, th = tip.offsetHeight;
      tip.style.left = Math.min(x + 14, innerWidth - tw - 8) + 'px';
      tip.style.top = Math.min(y + 14, innerHeight - th - 8) + 'px';
    },
    onClick(n) { location.href = 'index.html?skill=' + encodeURIComponent(n.id); },
    afterDraw(ctx, view, idMap) {
      const lw = (px) => px / view.k; // keep stroke widths visually constant under zoom
      // ✨ Active journey constellations — a glowing path through the journey's skills, in order.
      constellations.forEach((c) => {
        if (!activeJ.has(c.id)) return;
        const pts = c.names.map((n) => idMap[n]).filter(Boolean);
        if (pts.length < 2) return;
        ctx.save();
        ctx.shadowColor = c.color; ctx.shadowBlur = 14; ctx.strokeStyle = c.color;
        ctx.globalAlpha = 0.92; ctx.lineWidth = lw(2.2); ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
        ctx.shadowBlur = 0;
        pts.forEach((p) => { ctx.fillStyle = c.color; ctx.globalAlpha = 0.95; ctx.beginPath(); ctx.arc(p.x, p.y, (p.r || 5) + lw(2), 0, 7); ctx.fill(); });
        ctx.globalAlpha = 1; ctx.fillStyle = c.color; ctx.font = `600 ${lw(13)}px -apple-system,system-ui,sans-serif`;
        ctx.fillText(c.emoji + ' ' + c.name, pts[0].x + lw(9), pts[0].y - lw(9));
        ctx.restore();
      });
      // 🛸 Your personal trail — dashed line through the skills you've run, ringed.
      if (trailOn && trailUniq.length) {
        const pts = trailUniq.map((n) => idMap[n]).filter(Boolean);
        if (pts.length) {
          ctx.save();
          ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = 0.5; ctx.lineWidth = lw(1.5);
          ctx.setLineDash([lw(5), lw(5)]);
          ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
          ctx.stroke(); ctx.setLineDash([]);
          ctx.globalAlpha = 0.9;
          pts.forEach((p) => { ctx.beginPath(); ctx.arc(p.x, p.y, (p.r || 5) + lw(3), 0, 7); ctx.stroke(); });
          ctx.restore();
        }
      }
    },
  });
})();
</script>
</body>
</html>
