<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google-site-verification" content="osZgdSLYnqidzCKt4CxjqAxo44OqGvlKi-Bmg0UmxFQ" />
<title>🌌 Skill Galaxy — explore every skill as a living map</title>
<meta name="description" content="The whole skills library as an interactive constellation: skills clustered by profession, brightness by eval score, Guided Journeys traced as star-paths, linked by what pairs with what. Drag, zoom, click a star to run it." />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body { overflow: hidden; }
  .galaxy-wrap { position: fixed; inset: 0; top: 0; }
  #galaxyCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    background: radial-gradient(ellipse at 50% 40%, #11151d 0%, #0a0c11 70%, #07080b 100%); }
  .galaxy-top { position: absolute; top: 14px; left: 16px; right: 16px; z-index: 5; display: flex;
    gap: 12px; align-items: center; flex-wrap: wrap; pointer-events: none; }
  .galaxy-top > * { pointer-events: auto; }
  .galaxy-title { font-size: 18px; font-weight: 800; letter-spacing: -.01em; }
  .galaxy-title small { font-weight: 500; color: var(--muted); font-size: 12px; }
  #galaxySearch { padding: 8px 12px; min-width: 190px; background: rgba(20,24,31,.85); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); font: inherit; font-size: 13px; backdrop-filter: blur(6px); }
  .galaxy-back { padding: 8px 12px; background: rgba(20,24,31,.85); border: 1px solid var(--border); border-radius: 9px;
    color: var(--text); font: inherit; font-size: 13px; text-decoration: none; backdrop-filter: blur(6px); }
  .galaxy-hint { position: absolute; bottom: 12px; left: 16px; z-index: 5; font-size: 11.5px; color: var(--muted);
    background: rgba(10,12,17,.6); padding: 5px 10px; border-radius: 8px; backdrop-filter: blur(4px); }
  .legend { position: absolute; bottom: 12px; right: 12px; z-index: 5; max-width: 230px; max-height: 46vh; overflow: auto;
    background: rgba(13,15,20,.82); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px;
    font-size: 11px; backdrop-filter: blur(8px); display: flex; flex-wrap: wrap; gap: 4px 10px; }
  .legend b { width: 100%; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 2px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; color: var(--text); cursor: pointer; opacity: .72; }
  .legend span:hover { opacity: 1; }
  .legend span.on { opacity: 1; font-weight: 700; text-shadow: 0 0 8px currentColor; }
  .legend i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  #gtip { position: fixed; z-index: 20; max-width: 280px; pointer-events: none; display: none;
    background: rgba(13,15,20,.96); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #gtip .t { font-weight: 700; font-size: 13.5px; }
  #gtip .b { font-size: 11px; color: var(--accent-2); margin: 2px 0 4px; }
  #gtip .d { font-size: 12px; color: var(--muted); line-height: 1.4; }
  #gtip .e { font-size: 11px; color: #7bd88f; margin-top: 4px; }
  .gbtn { padding: 8px 12px; background: rgba(20,24,31,.85); border: 1px solid var(--border); border-radius: 9px;
    color: var(--text); font: inherit; font-size: 13px; cursor: pointer; backdrop-filter: blur(6px); }
  .gbtn.on { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  #gpanel { position: absolute; top: 60px; right: 12px; z-index: 8; width: 292px; max-height: 70vh; overflow: auto;
    background: rgba(13,15,20,.94); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px;
    backdrop-filter: blur(10px); box-shadow: 0 14px 40px rgba(0,0,0,.5);
    transform: translateX(16px); opacity: 0; pointer-events: none; transition: all .25s ease; }
  #gpanel.open { transform: none; opacity: 1; pointer-events: auto; }
  #gpanel h2 { margin: 0 0 2px; font-size: 16px; }
  #gpanel .b { font-size: 11px; color: var(--accent-2); text-transform: uppercase; letter-spacing: .04em; }
  #gpanel .d { font-size: 12.5px; color: var(--muted); line-height: 1.5; margin: 8px 0; }
  #gpanel .e { font-size: 12px; color: #7bd88f; }
  #gpanel .run { display: block; text-align: center; margin: 10px 0 4px; padding: 9px; border-radius: 9px;
    background: var(--accent-grad); color: #1a1207; font-weight: 700; text-decoration: none; }
  #gpanel .rel { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 8px; font-size: 12px; }
  #gpanel .rel b { display: block; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  #gpanel .rel a { display: block; color: var(--text); text-decoration: none; padding: 3px 0; }
  #gpanel .rel a:hover { color: var(--accent); }
  #gpanel .x { position: absolute; top: 8px; right: 10px; background: none; border: 0; color: var(--muted); font-size: 16px; cursor: pointer; }
  #gcaption { position: absolute; left: 50%; bottom: 54px; transform: translateX(-50%) translateY(8px); z-index: 7;
    background: rgba(13,15,20,.92); border: 1px solid var(--border); border-radius: 999px; padding: 10px 22px;
    font-size: 14.5px; font-weight: 600; backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,.45);
    opacity: 0; transition: all .4s ease; pointer-events: none; white-space: nowrap; max-width: 92vw; overflow: hidden; text-overflow: ellipsis; }
  #gcaption.show { opacity: 1; transform: translateX(-50%); }
  #gcaption small { color: var(--muted); font-weight: 400; margin-left: 8px; }
</style>
</head>
<body>
<div class="galaxy-wrap">
  <canvas id="galaxyCanvas"></canvas>
  <div class="galaxy-top">
    <a href="index.html" class="galaxy-back">← Playground</a>
    <span class="galaxy-title">🌌 Skill Galaxy <small id="galaxyCount"></small></span>
    <input id="galaxySearch" type="search" placeholder="Find a skill… (Enter flies you there)" />
    <button id="tourBtn" class="gbtn" type="button" title="Sit back — a guided flight across the professions and one Journey constellation">▶ Sky tour</button>
    <button id="forYouBtn" class="gbtn" type="button" title="Highlights high-scoring skills next to the ones you've already run">🧭 For you</button>
    <button id="warpBtn3d-anchor" style="display:none"></button><a href="galaxy3d.html" class="ghost" style="text-decoration:none" title="The galaxy in real 3D — fly through it">🌌 3D</a><button id="warpBtn" class="gbtn" type="button" title="Hyperspace jump to a random top-rated skill — serendipity mode">🎲 Warp</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="galaxy-hint">drag to pan · scroll to zoom · click a star for details · Enter in search flies to it · brightness = eval score</div>
  <div id="gtip"></div>
  <aside id="gpanel"><button class="x" type="button" title="Close">✕</button><div id="gpanelBody"></div></aside>
  <div id="gcaption"></div>
</div>

<script src="forcegraph.js"></script>
<script>
const el = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
// Friendly bundle labels (strip the pm- prefix, title-case).
const label = (p) => p.replace(/^pm-/, '').replace(/(^|-)(\w)/g, (_, d, c) => (d ? ' ' : '') + c.toUpperCase()).trim();

(async function () {
  let skills = [], trending = {}, journeys = [];
  try { skills = (await (await fetch('skills.json')).json()).skills; } catch (_) {}
  try { trending = ((await (await fetch('trending.json', { cache: 'no-store' })).json()).skills || []).reduce((m, t) => (m[t.name] = true, m), {}); } catch (_) {}
  try { journeys = (await (await fetch('hubs.json')).json()).journeys || []; } catch (_) {}
  if (!skills.length) { el('galaxyCount').textContent = '— could not load skills.json'; return; }

  const canvas = el('galaxyCanvas');
  const r = canvas.getBoundingClientRect(), W = r.width, H = r.height, cx = W / 2, cy = H / 2;

  // One anchor + colour per bundle, arranged on a ring so each profession forms a constellation.
  const bundles = [...new Set(skills.map((s) => s.plugin))];
  const ringR = Math.min(W, H) * 0.34;
  const bmeta = {};
  bundles.forEach((b, i) => {
    const a = (i / bundles.length) * Math.PI * 2 - Math.PI / 2;
    bmeta[b] = { color: `hsl(${Math.round((i / bundles.length) * 360)}, 70%, 62%)`,
      ax: cx + Math.cos(a) * ringR, ay: cy + Math.sin(a) * ringR };
  });

  // Brightness encodes eval score: a 5/5 skill blazes, an unscored one is a dim grey ember — so the
  // eval-coverage gap is literally visible across the galaxy.
  const nodes = skills.map((s, i) => {
    const m = bmeta[s.plugin], score = s.eval ? s.eval.score : 0;
    return { id: s.name, s, scored: !!s.eval,
      color: s.eval ? m.color : '#5b6472',
      bright: s.eval ? Math.max(0.55, Math.min(1, (score - 3) / 2)) : 0.26,
      ax: m.ax, ay: m.ay, seed: i * 1.7,
      r: 4 + (score ? (score - 3.5) * 4 : 1.5), trend: !!trending[s.name] };
  });
  const idset = new Set(nodes.map((n) => n.id));
  const seen = new Set(), links = [];
  skills.forEach((s) => {
    const add = (t) => { if (t && idset.has(t)) { const k = [s.name, t].sort().join('|'); if (!seen.has(k)) { seen.add(k); links.push({ source: s.name, target: t, same: skills.find((x) => x.name === t)?.plugin === s.plugin }); } } };
    if (s.readsFirst) add(s.readsFirst);
    (s.related || []).forEach(add);
  });
  const scoredN = nodes.filter((n) => n.scored).length;
  el('galaxyCount').textContent = `· ${nodes.length} skills · ${bundles.length} professions · ${scoredN} eval-scored (brighter = higher)`;

  // ✨ Constellations — each Guided Journey is an ordered path of skills you can light up as an overlay.
  const JCOLORS = ['#ffd36e', '#7ee0c0', '#8fb8ff', '#f49ac1', '#c89bff', '#ff9f6b', '#9be15d'];
  const constellations = journeys.map((j, i) => ({
    id: j.id, name: j.name, emoji: j.emoji || '✨', color: JCOLORS[i % JCOLORS.length],
    names: [].concat(...(j.stages || []).map((st) => (st.skills || []).map((sk) => sk[0]))).filter((n) => idset.has(n)),
  })).filter((c) => c.names.length > 1);
  const activeJ = new Set();

  // 🛸 My trail — skills you've actually run (the playground's saved-runs history, this browser).
  let trailUniq = [];
  try { trailUniq = [...new Set((JSON.parse(localStorage.getItem('pm_workspace')) || []).map((r) => r.name))].filter((n) => idset.has(n)); } catch (_) {}
  let trailOn = false;

  // Legend (click a profession to spotlight it; click a journey to trace its constellation).
  let spotlight = null;
  let html = '<b>Professions · ☀ brightness = eval score</b>' + bundles.map((b) =>
    `<span data-b="${esc(b)}"><i style="background:${bmeta[b].color}"></i>${esc(label(b))}</span>`).join('');
  if (constellations.length) html += '<b style="margin-top:7px">✨ Journeys — click to trace</b>' + constellations.map((c) =>
    `<span data-j="${esc(c.id)}"><i style="background:${c.color}"></i>${esc(c.emoji)} ${esc(c.name)}</span>`).join('');
  if (trailUniq.length) html += `<b style="margin-top:7px">🛸 You</b><span data-trail="1"><i style="background:#fff"></i>My trail (${trailUniq.length} run)</span>`;
  el('legend').innerHTML = html;
  el('legend').querySelectorAll('span[data-b]').forEach((sp) =>
    sp.addEventListener('click', () => { spotlight = (spotlight === sp.dataset.b) ? null : sp.dataset.b;
      sp.parentNode.querySelectorAll('span[data-b]').forEach((x) => x.classList.toggle('on', x.dataset.b === spotlight)); }));
  el('legend').querySelectorAll('span[data-j]').forEach((sp) =>
    sp.addEventListener('click', () => { activeJ.has(sp.dataset.j) ? activeJ.delete(sp.dataset.j) : activeJ.add(sp.dataset.j);
      sp.classList.toggle('on', activeJ.has(sp.dataset.j)); }));
  const trailEl = el('legend').querySelector('span[data-trail]');
  if (trailEl) trailEl.addEventListener('click', () => { trailOn = !trailOn; trailEl.classList.toggle('on', trailOn); });

  let query = '';
  el('galaxySearch').addEventListener('input', (e) => { query = e.target.value.toLowerCase().trim(); });
  // Enter = fly the camera to the best match and open its panel.
  el('galaxySearch').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' || !query) return;
    const hit = nodes.find((n) => n.s.title.toLowerCase().includes(query)) ||
      nodes.find((n) => (n.s.title + ' ' + n.s.name + ' ' + n.s.description).toLowerCase().includes(query));
    if (hit) { stopTour(); graph.flyTo(hit.x, hit.y, 2.3, 1000); openPanel(hit); }
  });

  const tip = el('gtip');

  function lit(n) {
    if (query) return (n.s.title + ' ' + n.s.name + ' ' + n.s.description).toLowerCase().includes(query);
    if (spotlight) return n.s.plugin === spotlight;
    return true;
  }

  // Tour / recommendation state — declared before create(), which draws synchronously.
  let tourTimers = [], tourPath = [], touring = false, forYou = [];
  // Per-frame label collision boxes (world coords) — see the label block in drawNode.
  const labelBoxes = []; let lastLabelReset = 0;
  // 🌠 Cosmic events (drawn in SCREEN space in afterDraw): ambient meteors + warp streaks.
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const meteors = []; let nextMeteor = performance.now() + 3000;
  let warpUntil = 0; // hyperspace streak effect while a warp flight is underway

  const graph = PMGraph.create(canvas, {
    nodes, links, repulsion: 900, spring: 0.02, linkLen: 42, gravity: 0.06,
    prewarm: 280, alphaDecay: 0.05, // settle off-screen, then freeze quickly — no perpetual motion
    drawLink(ctx, a, b) {
      const on = lit(a) && lit(b);
      ctx.strokeStyle = on ? 'rgba(150,170,200,0.16)' : 'rgba(120,130,150,0.04)';
      ctx.lineWidth = a.same && on ? 0.8 : 0.5;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    },
    drawNode(ctx, n, hovered, k) {
      const on = lit(n), rad = n.r;
      ctx.globalAlpha = on ? 1 : 0.12;
      // glow
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, rad * 3.4);
      grd.addColorStop(0, n.color); grd.addColorStop(0.35, n.color); grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = (on ? (n.trend ? 0.5 : 0.32) : 0.05) * n.bright;
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(n.x, n.y, rad * 3.4, 0, 7); ctx.fill();
      // core — brightness scales with eval score (unscored skills stay dim)
      ctx.globalAlpha = on ? n.bright : 0.1;
      ctx.fillStyle = n.color; ctx.beginPath(); ctx.arc(n.x, n.y, rad, 0, 7); ctx.fill();
      // trending = a static ring (no animation, so the galaxy stays perfectly still)
      if (n.trend) { ctx.globalAlpha = on ? 0.85 : 0.1; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(n.x, n.y, rad + 3, 0, 7); ctx.stroke(); }
      if (hovered) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(n.x, n.y, rad, 0, 7); ctx.stroke(); }
      // Labels: constant SCREEN size (font scales 1/k so zooming never blows the text up),
      // collision-culled per frame so dense clusters show a few names instead of word soup,
      // and suppressed entirely during the sky tour — the captions carry the story there.
      const wantLabel = on && !touring && (hovered || (query && !hovered) || (k > 2.1 && n.bright > 0.6) || k > 3.2);
      if (wantLabel) {
        const now = performance.now();
        if (now - lastLabelReset > 8) { labelBoxes.length = 0; lastLabelReset = now; }
        const fs = 11 / k, pad = 3 / k;
        const wpx = (n.s.title.length * 6.2) / k, hpx = 14 / k;
        const bx = n.x + rad + 4 / k, by = n.y - hpx / 2;
        const clash = !hovered && labelBoxes.some((b) => bx < b.x + b.w + pad && bx + wpx + pad > b.x && by < b.y + b.h + pad && by + hpx + pad > b.y);
        if (!clash) {
          labelBoxes.push({ x: bx, y: by, w: wpx, h: hpx });
          ctx.globalAlpha = 1; ctx.fillStyle = hovered ? '#fff' : 'rgba(220,226,236,0.8)';
          ctx.font = (hovered ? '600 ' : '') + fs + 'px -apple-system,system-ui,sans-serif';
          ctx.fillText(n.s.title, n.x + rad + 4 / k, n.y + fs / 3);
        }
      }
      ctx.globalAlpha = 1;
    },
    onHover(n, x, y) {
      if (!n) { tip.style.display = 'none'; return; }
      tip.innerHTML = `<div class="t">${esc(n.s.title)}</div><div class="b">${esc(label(n.s.plugin))}${n.trend ? ' · 🔥 trending' : ''}</div><div class="d">${esc((n.s.summary || n.s.description || '').slice(0, 150))}</div>${n.s.eval ? `<div class="e">✅ ${n.s.eval.score}/5 eval</div>` : ''}`;
      tip.style.display = 'block';
      const tw = tip.offsetWidth, th = tip.offsetHeight;
      tip.style.left = Math.min(x + 14, innerWidth - tw - 8) + 'px';
      tip.style.top = Math.min(y + 14, innerHeight - th - 8) + 'px';
    },
    onClick(n) { openPanel(n); },
    afterDraw(ctx, view, idMap) {
      const lw = (px) => px / view.k; // keep stroke widths visually constant under zoom
      // ✨ Active journey constellations — a glowing path through the journey's skills, in order.
      constellations.forEach((c) => {
        if (!activeJ.has(c.id)) return;
        const pts = c.names.map((n) => idMap[n]).filter(Boolean);
        if (pts.length < 2) return;
        ctx.save();
        ctx.shadowColor = c.color; ctx.shadowBlur = 14; ctx.strokeStyle = c.color;
        ctx.globalAlpha = 0.92; ctx.lineWidth = lw(2.2); ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
        ctx.shadowBlur = 0;
        pts.forEach((p) => { ctx.fillStyle = c.color; ctx.globalAlpha = 0.95; ctx.beginPath(); ctx.arc(p.x, p.y, (p.r || 5) + lw(2), 0, 7); ctx.fill(); });
        ctx.globalAlpha = 1; ctx.fillStyle = c.color; ctx.font = `600 ${lw(13)}px -apple-system,system-ui,sans-serif`;
        ctx.fillText(c.emoji + ' ' + c.name, pts[0].x + lw(9), pts[0].y - lw(9));
        ctx.restore();
      });
      // 🧭 "For you" recommendations — pulsing rings on the suggested stars.
      if (forYou.length) {
        const t = performance.now() / 1000;
        forYou.forEach((name, i) => {
          const p = idMap[name]; if (!p) return;
          const pulse = 3 + Math.sin(t * 2.4 + i) * 2;
          ctx.save();
          ctx.strokeStyle = '#ffd36e'; ctx.globalAlpha = 0.85; ctx.lineWidth = lw(1.6);
          ctx.beginPath(); ctx.arc(p.x, p.y, (p.r || 5) + lw(4 + pulse), 0, 7); ctx.stroke();
          ctx.restore();
        });
      }
      // ▶ Sky-tour: the currently-traced journey path gets marching ants.
      if (tourPath.length > 1) {
        const pts = tourPath.map((n) => idMap[n]).filter(Boolean);
        if (pts.length > 1) {
          ctx.save();
          ctx.strokeStyle = '#ffd36e'; ctx.shadowColor = '#ffd36e'; ctx.shadowBlur = 12;
          ctx.globalAlpha = 0.95; ctx.lineWidth = lw(2.4); ctx.lineJoin = 'round';
          ctx.setLineDash([lw(10), lw(7)]); ctx.lineDashOffset = -(performance.now() / 24) / view.k;
          ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
          ctx.stroke(); ctx.setLineDash([]);
          ctx.restore();
        }
      }
      // 🌠 Cosmic events — meteors + warp streaks, in SCREEN space so zoom doesn't touch them.
      if (!reduceMotion) {
        const now = performance.now();
        ctx.save();
        ctx.setTransform(window.devicePixelRatio > 2 ? 2 : (window.devicePixelRatio || 1), 0, 0, window.devicePixelRatio > 2 ? 2 : (window.devicePixelRatio || 1), 0, 0);
        const sw = canvas.clientWidth, sh = canvas.clientHeight;
        // Ambient shooting stars: one every ~5-9s, a brief bright streak across a corner.
        if (now > nextMeteor && meteors.length < 3 && !touring) {
          nextMeteor = now + 5000 + Math.random() * 4000;
          const fromLeft = Math.random() < 0.5;
          meteors.push({ t0: now, dur: 900 + Math.random() * 500,
            x0: fromLeft ? -40 : sw + 40, y0: Math.random() * sh * 0.45,
            dx: (fromLeft ? 1 : -1) * (sw * 0.35 + Math.random() * sw * 0.2), dy: sh * (0.18 + Math.random() * 0.22) });
        }
        for (let i = meteors.length - 1; i >= 0; i--) {
          const m = meteors[i], p = (now - m.t0) / m.dur;
          if (p >= 1) { meteors.splice(i, 1); continue; }
          const x = m.x0 + m.dx * p, y = m.y0 + m.dy * p;
          const tail = 70 * (1 - p * 0.5);
          const ang = Math.atan2(m.dy, m.dx);
          const g = ctx.createLinearGradient(x, y, x - Math.cos(ang) * tail, y - Math.sin(ang) * tail);
          g.addColorStop(0, 'rgba(255,255,255,' + (0.9 * (1 - p)) + ')');
          g.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.strokeStyle = g; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - Math.cos(ang) * tail, y - Math.sin(ang) * tail); ctx.stroke();
        }
        // 🎲 Warp: radial hyperspace streaks from the screen centre while the camera flies.
        if (now < warpUntil) {
          const cx2 = sw / 2, cy2 = sh / 2, k = 1 - (warpUntil - now) / 750;
          for (let i = 0; i < 26; i++) {
            const a = (i / 26) * Math.PI * 2 + (i % 3) * 0.4;
            const r0 = 60 + k * 260, r1 = r0 + 90 + k * 140;
            ctx.strokeStyle = 'rgba(190,215,255,' + (0.5 * (1 - k)) + ')';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(cx2 + Math.cos(a) * r0, cy2 + Math.sin(a) * r0);
            ctx.lineTo(cx2 + Math.cos(a) * r1, cy2 + Math.sin(a) * r1);
            ctx.stroke();
          }
        }
        ctx.restore();
      }
      // 🛸 Your personal trail — dashed line through the skills you've run, ringed.
      if (trailOn && trailUniq.length) {
        const pts = trailUniq.map((n) => idMap[n]).filter(Boolean);
        if (pts.length) {
          ctx.save();
          ctx.strokeStyle = '#ffffff'; ctx.globalAlpha = 0.5; ctx.lineWidth = lw(1.5);
          ctx.setLineDash([lw(5), lw(5)]);
          ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
          ctx.stroke(); ctx.setLineDash([]);
          ctx.globalAlpha = 0.9;
          pts.forEach((p) => { ctx.beginPath(); ctx.arc(p.x, p.y, (p.r || 5) + lw(3), 0, 7); ctx.stroke(); });
          ctx.restore();
        }
      }
    },
  });

  // ── Skill panel: click a star → details, run, and hop to neighbours ─────────
  const neighbours = {};
  links.forEach((l) => {
    (neighbours[l.source] = neighbours[l.source] || []).push(l.target);
    (neighbours[l.target] = neighbours[l.target] || []).push(l.source);
  });
  function openPanel(n) {
    const rel = (neighbours[n.id] || []).slice(0, 5);
    el('gpanelBody').innerHTML =
      `<div class="b">${esc(label(n.s.plugin))}${n.trend ? ' · 🔥 trending' : ''}</div>` +
      `<h2>${esc(n.s.title)}</h2>` +
      (n.s.eval ? `<div class="e">✅ eval-scored ${n.s.eval.score}/5</div>` : '') +
      `<div class="d">${esc((n.s.summary || n.s.description || '').slice(0, 260))}</div>` +
      `<a class="run" href="index.html?skill=${encodeURIComponent(n.id)}">▶ Run this skill</a>` +
      (rel.length ? `<div class="rel"><b>Connected stars</b>${rel.map((r) =>
        `<a href="#" data-go="${esc(r)}">↗ ${esc((idset.has(r) && nodes.find((x) => x.id === r).s.title) || r)}</a>`).join('')}</div>` : '');
    el('gpanel').classList.add('open');
    el('gpanelBody').querySelectorAll('a[data-go]').forEach((a) => a.addEventListener('click', (e) => {
      e.preventDefault();
      const t = nodes.find((x) => x.id === a.dataset.go);
      if (t) { graph.flyTo(t.x, t.y, 2.3, 900); openPanel(t); }
    }));
    if (window.pmTrack) pmTrack('galaxy/panel/' + n.id);
  }
  el('gpanel').querySelector('.x').addEventListener('click', () => el('gpanel').classList.remove('open'));

  // ── ▶ Sky tour: an auto-piloted flight — constellations first, then a Journey traced ──
  function caption(text, sub) {
    const c = el('gcaption');
    c.innerHTML = esc(text) + (sub ? `<small>${esc(sub)}</small>` : '');
    c.classList.add('show');
  }
  function stopTour() {
    if (!touring && !tourPath.length) return;
    touring = false; tourTimers.forEach(clearTimeout); tourTimers = []; tourPath = [];
    el('gcaption').classList.remove('show');
    el('tourBtn').classList.remove('on'); el('tourBtn').textContent = '▶ Sky tour';
  }
  function startTour() {
    stopTour(); touring = true;
    el('tourBtn').classList.add('on'); el('tourBtn').textContent = '⏹ End tour';
    if (window.pmTrack) pmTrack('galaxy/tour');
    // Stops: the 6 brightest professions (by avg eval, min 4 skills), then one Journey.
    const byBundle = {};
    nodes.forEach((n) => (byBundle[n.s.plugin] = byBundle[n.s.plugin] || []).push(n));
    const stops = Object.entries(byBundle)
      .filter(([, ns]) => ns.length >= 4)
      .map(([b, ns]) => {
        const scored = ns.filter((n) => n.scored);
        const avg = scored.length ? scored.reduce((s, n) => s + n.s.eval.score, 0) / scored.length : 0;
        return { b, ns, avg, x: ns.reduce((s, n) => s + n.x, 0) / ns.length, y: ns.reduce((s, n) => s + n.y, 0) / ns.length };
      })
      .sort((a, b) => b.avg - a.avg).slice(0, 6);
    let t = 200;
    const HOLD = 3200;
    stops.forEach((st) => {
      tourTimers.push(setTimeout(() => {
        graph.flyTo(st.x, st.y, 1.9, 1300);
        caption(`✨ ${label(st.b)}`, `${st.ns.length} skills${st.avg ? ' · avg eval ' + st.avg.toFixed(1) + '/5' : ''}`);
      }, t));
      t += HOLD;
    });
    const j = constellations[0];
    if (j) {
      tourTimers.push(setTimeout(() => {
        const pts = j.names.map((n) => nodes.find((x) => x.id === n)).filter(Boolean);
        const cx2 = pts.reduce((s, p) => s + p.x, 0) / pts.length, cy2 = pts.reduce((s, p) => s + p.y, 0) / pts.length;
        graph.flyTo(cx2, cy2, 1.25, 1400);
        tourPath = j.names;
        caption(`${j.emoji} Journey: ${j.name}`, 'a chain of skills, run in order — each output feeds the next');
      }, t));
      t += HOLD + 1200;
    }
    tourTimers.push(setTimeout(() => {
      graph.flyTo(cx, cy, 0.9, 1500);
      caption('🌌 731 skills · one map', 'click any star · Enter in search flies to it');
      tourTimers.push(setTimeout(stopTour, 2600));
    }, t));
  }
  el('tourBtn').addEventListener('click', () => (touring ? stopTour() : startTour()));
  canvas.addEventListener('pointerdown', stopTour);

  // 🎲 Warp — hyperspace jump to a random top-rated star you haven't visited this session.
  const warped = new Set();
  el('warpBtn').addEventListener('click', () => {
    stopTour();
    let pool = nodes.filter((n) => n.scored && n.s.eval.score >= 4.5 && !warped.has(n.id));
    if (!pool.length) { warped.clear(); pool = nodes.filter((n) => n.scored && n.s.eval.score >= 4.5); }
    const target = pool[Math.floor(Math.random() * pool.length)];
    if (!target) return;
    warped.add(target.id);
    warpUntil = performance.now() + 750;
    graph.flyTo(target.x, target.y, 2.4, 750);
    setTimeout(() => { openPanel(target); caption('🎲 ' + target.s.title, label(target.s.plugin) + ' · ' + target.s.eval.score + '/5 — your serendipity stop'); setTimeout(() => el('gcaption').classList.remove('show'), 3000); }, 780);
    if (window.pmTrack) pmTrack('galaxy/warp');
  });

  // ── 🧭 For you: high-scoring stars orbiting the ones you've already run ──────
  el('forYouBtn').addEventListener('click', () => {
    if (forYou.length) { forYou = []; el('forYouBtn').classList.remove('on'); return; }
    const run = new Set(trailUniq);
    const homeBundles = new Set(trailUniq.map((n) => (nodes.find((x) => x.id === n) || {}).s?.plugin).filter(Boolean));
    const pool = nodes.filter((n) => !run.has(n.id) && n.scored)
      .sort((a, b) => (homeBundles.has(b.s.plugin) - homeBundles.has(a.s.plugin)) || (b.s.eval.score - a.s.eval.score) || (b.trend - a.trend));
    forYou = pool.slice(0, 6).map((n) => n.id);
    el('forYouBtn').classList.add('on');
    if (forYou.length) {
      const first = nodes.find((x) => x.id === forYou[0]);
      if (first) graph.flyTo(first.x, first.y, 1.6, 1000);
      caption('🧭 Picked for you', run.size ? 'high-scoring skills near the ones you already run' : 'the highest-scoring stars to start with');
      setTimeout(() => el('gcaption').classList.remove('show'), 3600);
    }
    if (window.pmTrack) pmTrack('galaxy/foryou');
  });
})();
</script>
</body>
</html>
